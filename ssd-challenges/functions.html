<!DOCTYPE HTML>
<html>
  <head>
    <title>
      Calculator
    </title>
  </head>

  <body>
    <p>
      <button onclick="
        updateCalculation('1')
        ">
        1
      </button>

      <button onclick="
      updateCalculation('2')
      ">
        2
      </button>

      <button onclick="
      updateCalculation('3')
      ">
        3
      </button>

      <button onclick="
      updateCalculation(' + ')
      ">
        +
      </button>
    </p>

    <p>

      <button onclick="
      updateCalculation('4')
      ">
        4
      </button>

      <button onclick="
      updateCalculation('5')
      ">
      5
      </button>

      <button onclick="
      updateCalculation('6')
      ">
        6
      </button>

      <button onclick="
      updateCalculation(' - ')
      ">
        -
      </button>

      </p>

      <p>

      <button onclick="
      updateCalculation('7')
      ">
        7
      </button>

      <button onclick="
      updateCalculation('8')
      ">
        8
      </button>

      <button onclick="
      updateCalculation('9')
      ">
        9
      </button>

      <button onclick="
      updateCalculation(' * ')
      ">
        *
      </button>
    </p>

    <p>
      <button onclick="
      updateCalculation('0')
      ">
        0 
      </button>

      <button onclick="
      updateCalculation('.')
      ">
        .
      </button>

      <button onclick="
      updateCalculation(' / ')
      ">
        /
      </button>

      <button onclick="
      calculation = eval(calculation) // this is a built-in function that evaluates a string as a mathematical expression
      console.log(calculation);
      alert(`Result: ${calculation}`);
      ">
        =
      </button>

    </p>

    <p>
      <button onclick="
      calculation = ''
      alert('Cleared');
      ">
        Clear
      </button> 
    </p>

  </body>

  <script>
    let calculation = ''; // a variable that holds the current calculation

    function updateCalculation(value) 
    {
      calculation = calculation + value
      console.log(calculation);
    }
  </script>

</html>
