// function using property helps double arrays multiple times.             
            function doubleArray(nums) {
            
              const numsDoubled = [];
              for (let i = 0; i < nums.length; i++) {
                //i simply points to each item one by one.
                const num = nums[i];
                if (num === 0) {
                  return numsDoubled;
//After breaking the loop, the function continues executing the code after the loop, so we use return to end the function.
                }
                numsDoubled.push(num * 2);
              }
              return numsDoubled;
            }
