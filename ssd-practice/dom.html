<!DOCTYPE html>
  <html>
    <head>
      <title>
        DOM
      </title>
    </head>

    <body>
      <button onclick="
       buttonElem.innerHTML = 'Hello World';
        ">
        hello
      </button>

      <script>
        document.body
        // a body element of the HTML document
        // document here is built-in object.

        document.body.innerHTML
        // an HTML content of the body element

        document.querySelector('button')
        // selects the first button element.

        document.querySelector('button').innerHTML
        // an HTML content of the first button element.

        //document.querySelector('button').innerHTML = 'Hello World';
        
        const buttonElem = document.querySelector('button');
        // we can store the button element in a variable and then change its content.

      </script>
    </body>
