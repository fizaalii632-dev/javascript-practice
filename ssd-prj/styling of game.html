<!DOCTYPE HTML>
<html>
  <head>
    <title>
      ROCK PAPER SCISSORS
    </title>

   <link rel="stylesheet"
   href="../ssd-prj/rock-paper-scissors.css"> 
  </head>

  <body>
    <p class="game-title">ROCK PAPER SCISSORS</p>

    <p>
      <button onclick="
        
        playGame('Rock')

      " class="move-button">
      <img src="../images/rock-emoji.png" class="move-icon">
      </button>

      <button onclick="
       
        playGame('Paper');
        
      " class="move-button">
      <img src="../images/paper-emoji.png" class="move-icon">
      </button>

      <button onclick="
      
         playGame('Scissors');
      
      " class="move-button">
      <img src="../images/scissors-emoji.png" class="move-icon">
      </button>

      <p class="js-result result"></p>
      <p class="js-moves"></p>
      <p class="js-score score"></p>

      <button onclick="
        score.wins = 0;
        score.losses = 0;
        score.ties = 0;
        localStorage.removeItem('score');
        updateScoreElement();
      " class="reset-score-button">
      Reset Score
      </button>
    </p>

    <script src="../ssd-prj/rock-paper-scissors.js"></script>
  </body>
</html>
