<!DOCTYPE HTML>
<html>
  <head>
    <title>
      ROCK PAPER SCISSORS
    </title>

    <style>
      body {
        background-color: black;
        color: white;
        font-family: Arial;

        .game-title {
          font-size: 30px;
          font-weight: bold;
        }
      }

      .move-icon {
        width: 50px;
        height: 50px;
      }

      .move-button {
        background-color: transparent;
        border: 3px solid white;
        width: 120px;
        height: 120px;
        border-radius: 60px;
        margin-right: 10px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <p class="game-title">ROCK PAPER SCISSORS</p>

    <p>
      <button onclick="
        
        playGame('Rock')

      " class="move-button">
      <img src="images/rock-emoji.png" class="move-icon">
      </button>

      <button onclick="
       
        playGame('Paper');
        
      " class="move-button">
      <img src="paper-emoji.png" class="move-icon">
      </button>

      <button onclick="
      
         playGame('Scissors');
      
      " class="move-button">
      <img src="Images/scissors-emoji.png" class="move-icon">
      </button>

      <button onclick="
        score.wins = 0;
        score.losses = 0;
        score.ties = 0;
        localStorage.removeItem('score');
        alert('Score Reset');
      ">
      Reset
      </button>
    </p>
  </body>

  <script>
    const score = 
    JSON.parse(localStorage.getItem('score')) || {
      wins: 0,
      losses: 0,
      ties: 0
      };

    /*
    if (!score) {
      score = {
        wins: 0,
        losses: 0,
        ties: 0
      }
    };
    */
    function playGame(playerMove) 
    {
       const computerMove = pickComputerMove();

        let result = '';

       if(playerMove === 'Scissors') 
      {
          if (computerMove === 'Rock') 
          {result = 'You Lose'}
          else if (computerMove === 'Paper') {result = 'You Win'}
          else if (computerMove === 'Scissors') {result = 'Tie'}
      }

      else if (playerMove === 'Paper') 
      {
          if (computerMove === 'Rock') {result = 'You Win'}
          else if (computerMove === 'Paper') {result = 'Tie'}
          else if (computerMove === 'Scissors') {result = 'You Lose'}
      }

      else if (playerMove === 'Rock') 
      {
          if (computerMove === 'Rock') {result = 'Tie'}
          else if (computerMove === 'Paper') {result = 'You Lose'}
          else if (computerMove === 'Scissors') {result = 'You Win'}
      }

      if (result === 'You Win')  {score.wins += 1}
      else if (result === 'You Lose') {score.losses += 1}
      else if (result === 'Tie') {score.ties += 1};

      localStorage.setItem('score', JSON.stringify(score));

      alert(`You Picked ${playerMove}, Computer Pciked ${computerMove}, ${result}
Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`)
    }

    function pickComputerMove() 
    {
      randomNumber = Math.random()

      let computerMove = '';

        if (randomNumber >= 0 && randomNumber < 1/3) {computerMove = 'Rock'}
        else if (randomNumber >= 1/3 && randomNumber <= 2/3) {computerMove = 'Paper'}
        else if (randomNumber >= 2/3 && randomNumber <= 1) {computerMove = 'Scissors'}

      return computerMove;
    }
  </script>
</html>
